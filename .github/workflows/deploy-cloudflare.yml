name: Deploy to Cloudflare Pages
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Reassemble chunked files
        run: |
          cd Build/chunks
          # Reassemble data.unityweb
          for f in $(python3 -c "import json; print(' '.join(json.load(open('data_manifest.json'))['chunks']))"); do
            cat "$f" >> ../WebGL.data.unityweb.bin
          done
          echo "Data.bin size: $(stat -c%s ../WebGL.data.unityweb.bin) bytes"
          
          # Reassemble wasm.unityweb (needs wasm manifest - use old chunks for now)
          if [ -f wasm_manifest.json ]; then
            for f in $(python3 -c "import json; print(' '.join(json.load(open('wasm_manifest.json'))['chunks']))"); do
              cat "$f" >> ../WebGL.wasm.unityweb.bin
            done
          fi
          echo "Wasm.bin size: $(stat -c%s ../WebGL.wasm.unityweb.bin) bytes"
          
          # Remove old .unityweb static files so functions take over
          rm -f ../WebGL.data.unityweb ../WebGL.wasm.unityweb
      
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler@3
          wrangler pages deploy . --project-name=offroad-insight --branch=main --commit-dirty=true --commit-message="deploy: auto"
